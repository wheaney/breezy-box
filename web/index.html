<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breezy Box</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; color: #eee; font-family: sans-serif; }

    #vnc-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-size: 1.2rem;
      color: #888;
      cursor: pointer;
      user-select: none;
    }

    #loading .hint {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="loading">
    <span id="loading-msg">Connecting to Breezy Box…</span>
    <span class="hint" id="loading-hint"></span>
  </div>
  <iframe id="vnc-frame" src="" title="Breezy Desktop"></iframe>

  <script>
    (function () {
      var NOVNC_PORT = 8080;

      /* Build the noVNC URL against the same host the page was served from. */
      var host = window.location.hostname;
      var novncUrl = 'https://' + host + ':' + NOVNC_PORT +
                     '/vnc_auto.html?autoconnect=1&reconnect=1&reconnect_delay=2000&quality=6&compression=6';

      var frame = document.getElementById('vnc-frame');
      var loading = document.getElementById('loading');
      var loadingMsg = document.getElementById('loading-msg');
      var loadingHint = document.getElementById('loading-hint');
      var frameReady = false;
      var permDone = false;

      function maybeHideLoading() {
        if (frameReady && permDone) loading.style.display = 'none';
      }

      frame.src = novncUrl;
      frame.addEventListener('load', function () {
        frameReady = true;
        maybeHideLoading();
      });

      function putWindowManagementAvailable(available) {
        fetch('/settings/breezy-box-host-window-management-available', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value: available ? 'true' : 'false' }),
        }).catch(function () {});
      }

      function postMonitors(screenDetails) {
        var monitors = screenDetails.screens.map(function (s) {
          return {
            label:  s.label,
            width:  s.width,
            height: s.height,
            x:      s.left,
            y:      s.top,
          };
        });
        fetch('/monitors', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(monitors),
        }).catch(function () {});
      }

      function screensSnapshot(screenDetails) {
        return screenDetails.screens.map(function (s) {
          return s.label + ':' + s.width + 'x' + s.height + '+' + s.left + '+' + s.top;
        }).join('|');
      }

      function attachScreenChangeListener(screenDetails) {
        var lastSnapshot = screensSnapshot(screenDetails);

        screenDetails.addEventListener('screenschange', function () {
          lastSnapshot = screensSnapshot(screenDetails);
          postMonitors(screenDetails);
        });

        /* Poll for coordinate-only changes (add/remove fires screenschange, but
         * geometry changes on existing screens do not). */
        setInterval(function () {
          var snap = screensSnapshot(screenDetails);
          if (snap !== lastSnapshot) {
            lastSnapshot = snap;
            postMonitors(screenDetails);
          }
        }, 2000);
      }

      /* Request window-management permission using the loading overlay as the
       * user-gesture surface. The overlay is already covering the full viewport
       * while noVNC connects, so the first click the user makes naturally lands
       * here and satisfies the gesture requirement without extra UI friction. */
      function requestWindowManagement() {
        if (!window.getScreenDetails) {
          putWindowManagementAvailable(false);
          permDone = true;
          maybeHideLoading();
          return;
        }
        navigator.permissions.query({ name: 'window-management' }).then(function (status) {
          if (status.state === 'granted') {
            window.getScreenDetails().then(function (screenDetails) {
              putWindowManagementAvailable(true);
              postMonitors(screenDetails);
              attachScreenChangeListener(screenDetails);
            }).catch(function () {
              putWindowManagementAvailable(false);
            });
            permDone = true;
            maybeHideLoading();
            return;
          }
          /* Permission not yet granted — wait for a click on the overlay. */
          loadingMsg.textContent = 'Click to connect';
          loadingHint.textContent = 'Allows multi-display window placement';
          loading.addEventListener('click', function onFirstClick() {
            loading.removeEventListener('click', onFirstClick);
            window.getScreenDetails().then(function (screenDetails) {
              putWindowManagementAvailable(true);
              postMonitors(screenDetails);
              attachScreenChangeListener(screenDetails);
              permDone = true;
              maybeHideLoading();
            }).catch(function () {
              /* User denied — report unavailable and proceed. */
              putWindowManagementAvailable(false);
              permDone = true;
              maybeHideLoading();
            });
          }, { once: true });
        }).catch(function () {
          putWindowManagementAvailable(false);
          permDone = true;
          maybeHideLoading();
        });
      }

      requestWindowManagement();

      function onResize() {
        frame.style.height = window.innerHeight + 'px';
      }

      window.addEventListener('resize', onResize);
      onResize();
    })();
  </script>
</body>
</html>
