<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breezy Box</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; color: #eee; font-family: sans-serif; }

    #vnc-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-size: 1.2rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="loading">Connecting to Breezy Box…</div>
  <iframe id="vnc-frame" src="" title="Breezy Desktop"></iframe>

  <script>
    (function () {
      var NOVNC_PORT = 8080;

      /* Build the noVNC URL against the same host the page was served from. */
      var host = window.location.hostname;
      var novncUrl = 'http://' + host + ':' + NOVNC_PORT +
                     '/vnc_auto.html?autoconnect=1&reconnect=1&reconnect_delay=2000&quality=6&compression=6&resize=scale';

      var frame = document.getElementById('vnc-frame');
      var loading = document.getElementById('loading');

      frame.src = novncUrl;
      frame.addEventListener('load', function () {
        loading.style.display = 'none';
      });

      /* Resize callback: keeps the iframe filling the viewport. */
      function onResize() {
        frame.style.height = window.innerHeight + 'px';

        /* TODO: notify the server of the new dimensions so noVNC / the
           remote session can resize to match. POST /status or a dedicated
           /resize endpoint. */
      }

      window.addEventListener('resize', onResize);
      onResize();
    })();
  </script>
</body>
</html>
